<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<head>
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />



  <style>
    
body {
Max-width: 100%;
   background: #6f8668;
   min-height: 100vh;
   display: flex;
   justify-content: center;
   align-items: center;
   overflow: hidden;
}

.container {
Margin:20px,60px;
Max-width: 470px;
      position: relative;
      display: flex;
      align-items: flex-center;
      justify-content: center;
      top: 50px;
}

/* ===== ENVELOPE WRAPPER ===== */

.envelope-wrapper {
  z-index:2;
  position: absolute;
  min-width:400px;
  max-width: 480px;
  min-height: 290px;
  max-height: 320px;
  height:auto;
  cursor: pointer;
  animation: shimmy 1.6s ease-in-out infinite;
  transform-orgin:center;
}

/* ===== FLAP ===== */

.flap {
  z-index:2;
  position: absolute;
  top: 0;
  width: 100%;
  min-height: 195px;
  transform-origin: top center;
  transition: transform 0.8s cubic-bezier(.22,.61,.36,1);
  transform-style: preserve-3d;
  
}

/* *** Text "tap to open" *** */
.tap-text {
      position: absolute;
      inset: 80px 10px 10px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
      color: #555;
    }

/* triangle shape */
.flap::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #c9beaf;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  box-shadow: inset 0 -8px 12px rgba(0,0,0,0.06);
    z-index:2;
}


/* ===== ENVELOPE BODY ===== */

.envelope-body {
  
  position: absolute;
  min-width:400px;
  max-width: 470px;
  min-height: 290px;
  max-height: 320px;
  height:auto;
  background: #dcd0c1;
  border-radius: 6px;
  box-shadow: 
    0 15px 30px rgba(0,0,0,0.25),
    inset 0 -8px 12px rgba(0,0,0,0.05);
}

/* bottom fold triangle */
.envelope-body::before,
.envelope-body::after {
  content: "";
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(to bottom right, transparent 50%, rgba(0,0,0,0.05) 51%);
}

.envelope-body::after {
  right: 0;
  transform: scaleX(-1);
}

/* ===== OPEN STATE ===== */

.envelope-wrapper.open .flap {
  transform: rotateX(-160deg);
}

/* ===== SHIMMY ANIMATION ===== */

@keyframes shimmy {
  0% { transform: rotate(0deg); }
  20% { transform: rotate(-2deg); }
  40% { transform: rotate(2deg); }
  60% { transform: rotate(-1.5deg); }
  80% { transform: rotate(1.5deg); }
  100% { transform: rotate(0deg); }
}

/* stop shimmy when opened */
.envelope-wrapper.open {
  animation: none;
}

    /*  LETTER  */


.letter-wrapper {
      z-index:3;
      position: absolute;
      display: flex;
      justify-content: relative;
      opacity: 0;
      transform-orgin:center;
      transition: transform .8s ease, opacity 1s ease;
      pointer-events: none;
    }

    .letter-wrapper.show {
      Top: 250px;
      opacity: 1;
      transform-orgin:center;
      transform: translateY(-550px);
      pointer-events: auto;
	width: auto;
      height: 500px;
    }

.front-content {
      position: absolute;
      inset: 0;
      /* bottom-border-radius: 10px; */
      background-image:
        url("https://i.pinimg.com/736x/51/02/79/5102799277ec2032bd6f631c77afbfac.jpg");
      opacity: 1;
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      background-attachment: fixed; 
    }

.back-content {
      position: absolute;
      inset: 0;
      background-image:
        url("https://i.pinimg.com/736x/ce/50/5d/ce505dc87f58d6c1dbe98e89ebf2cfa4.jpg");
      opacity: 1;
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      background-attachment: fixed; 
    }

    .letter {
      position: relative;
      width: 70vw;
      min-width: 425px;
      height: auto;
      transform-style: preserve-3d;
      transition: transform 1.0s ease;
      cursor: pointer;
    }

    .letter.flipped {
      transform: rotateY(180deg);
    }

    .front,
    .back {
      position: absolute;
      inset: 0;
      padding: 25px;
      backface-visibility: hidden;
      overflow-y: auto;
    }

    .front {
     /* text-align: center; */
      object-fit:fill;
    }

    .back {
      transform: rotateY(180deg);
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

.content{
  position: relative;
  z-index: 2;
}

.bottom-center{
  position: absolute;
  bottom: 8px;
  left: 16px;
  right:16px;
}

 .muted {
      opacity: 0.6;
      font-size: 12px;
      margin-top: 20px;
    }

	  a{
		color:#634e4e;
	  }
  </style>
</head>


<!-- ===== HTML ====== -->

    
<body>

<main class = "flex flex-col items-center">

<div class="container">
  
  <!-- ENVELOPE -->
<div class="envelope-wrapper" id="envelope">
  <div class="flap"></div>
  <div class="envelope-body"></div>
<div class="tap-text">
    <br></br>
    <br></br>
      TAP TO OPEN
    </div>
  
</div> <!-- div envelope wrapper -->


<!-- LETTER -->
    <div class="letter-wrapper" id="letterWrapper">
      <div class="letter" id="letter">
           
        <!-- FRONT -->
        <div class="front">
          <div class ="front-content"></div>

         
</div> <!-- div front -->

        <!-- BACK -->
        <div class="back">
        <div class="back-content" </div>
        <div class="bottom-center">
	<p> <a href="https://www.zola.com/wedding/guerra-cooke/rsvp"> Click Me </a>
</div> <!-- div back center -->	
        </div><!-- div back -->
      
      
            </div><!-- div letter -->
</div> <!-- div letter wrapper -->
  
  </div> <!-- div container -->
  

</main>

  <script>
   
const envelope = document.getElementById("envelope");

const letterWrapper = document.getElementById("letterWrapper");
    const letter = document.getElementById("letter");

let opened = false;
    let flipped = false;

envelope.addEventListener("click", () => {
      if (opened) return;
      opened = true;
      envelope.classList.add("open");

      setTimeout(() => {
        letterWrapper.classList.add("show");
      }, 300);
    });

    letter.addEventListener("click", () => {
      flipped = !flipped;
      letter.classList.toggle("flipped", flipped);
    });

  </script>

</body>
</html>
